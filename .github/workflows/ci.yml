# PhantomFPGA CI Pipeline
#
# Verifies everything compiles. No artifacts uploaded - this is a training
# project, not a release pipeline. Each job is self-contained.
#
name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

env:
  QEMU_VERSION: v10.2.0

jobs:
  # ===========================================================================
  # Build QEMU with PhantomFPGA device
  # ===========================================================================
  build-qemu:
    name: Build QEMU (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ninja-build python3 python3-pip pkg-config \
            libglib2.0-dev libpixman-1-dev libslirp-dev \
            libcap-ng-dev libattr1-dev
          sudo pip3 install meson

      - name: Cache QEMU source
        uses: actions/cache@v4
        with:
          path: platform/qemu/upstream
          key: qemu-src-${{ env.QEMU_VERSION }}

      - name: Cache QEMU build
        uses: actions/cache@v4
        with:
          path: platform/qemu/build
          key: qemu-build-${{ matrix.arch }}-${{ env.QEMU_VERSION }}-${{ hashFiles('platform/qemu/src/**') }}
          restore-keys: |
            qemu-build-${{ matrix.arch }}-${{ env.QEMU_VERSION }}-

      - name: Build QEMU
        run: |
          cd platform/qemu
          ./setup.sh
          make build
        env:
          NPROC: 4

      - name: Verify PhantomFPGA device
        run: |
          ./platform/qemu/build/qemu-system-${{ matrix.arch }} -device help 2>&1 | grep -i phantom
          echo "PhantomFPGA device found!"

  # ===========================================================================
  # Build driver (compile check against host kernel)
  # ===========================================================================
  build-driver:
    name: Check Driver Compiles
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kernel headers
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-headers-$(uname -r) build-essential

      - name: Build driver
        run: |
          cd driver
          make
          echo "Driver compiles successfully!"

      - name: Check for warnings
        run: |
          cd driver
          make clean
          make 2>&1 | tee build.log
          if grep -i "warning:" build.log; then
            echo "::warning::Driver has compilation warnings"
          fi

  # ===========================================================================
  # Build app (compile check)
  # ===========================================================================
  build-app:
    name: Check App Compiles
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Build app
        run: |
          cd app
          mkdir -p build && cd build
          cmake ..
          make
          echo "App compiles successfully!"

      - name: Run app help
        run: |
          ./app/build/phantomfpga_app --help

  # ===========================================================================
  # Summary job - branch protection should require this
  # ===========================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-22.04
    needs: [build-qemu, build-driver, build-app]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build-qemu.result }}" != "success" ]; then
            echo "QEMU build failed"
            exit 1
          fi
          if [ "${{ needs.build-driver.result }}" != "success" ]; then
            echo "Driver build failed"
            exit 1
          fi
          if [ "${{ needs.build-app.result }}" != "success" ]; then
            echo "App build failed"
            exit 1
          fi
          echo "All CI checks passed!"
