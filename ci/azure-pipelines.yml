# PhantomFPGA CI/CD Pipeline
#
# Azure Pipelines configuration for building and testing the PhantomFPGA
# QEMU-based training platform. Tests both x86_64 and aarch64 targets.
#
# Requirements:
#   - Azure Pipelines with Standard_D4s_v3 VMs (nested virtualization for KVM)
#   - Or self-hosted agent with KVM access
#
# Pipeline stages:
#   1. Build QEMU with PhantomFPGA device
#   2. Build Buildroot guest images
#   3. Run QTest unit tests
#   4. Run integration tests in QEMU
#   5. Collect artifacts
#
# "A CI pipeline that doesn't run is the most reliable CI pipeline."
#   -- No one, ever (but they thought it)

trigger:
  branches:
    include:
      - main
      - develop
      - 'feature/*'
  paths:
    exclude:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'
      - 'docs/**'

# Variables shared across stages
variables:
  # Build configuration
  BUILDROOT_VERSION: '2024.02.10'
  QEMU_VERSION: 'v8.2.2'

  # Cache keys (increment to invalidate)
  CACHE_VERSION: 'v1'

  # Timeouts (in minutes)
  QEMU_BUILD_TIMEOUT: 60
  BUILDROOT_BUILD_TIMEOUT: 120
  TEST_TIMEOUT: 30

  # Parallelism
  NPROC: '$(nproc)'

# Use Microsoft-hosted Ubuntu VMs with nested virtualization
# Standard_D4s_v3 supports nested virtualization for KVM
pool:
  vmImage: 'ubuntu-22.04'

stages:
  # ============================================================================
  # Stage 1: Build QEMU
  # ============================================================================
  - stage: BuildQEMU
    displayName: 'Build QEMU'
    jobs:
      - job: BuildQEMUx86
        displayName: 'QEMU x86_64'
        timeoutInMinutes: $(QEMU_BUILD_TIMEOUT)

        steps:
          - checkout: self
            fetchDepth: 1

          - task: Cache@2
            displayName: 'Cache QEMU build'
            inputs:
              key: 'qemu | $(CACHE_VERSION) | $(QEMU_VERSION) | x86_64 | $(Build.SourceVersion)'
              restoreKeys: |
                qemu | $(CACHE_VERSION) | $(QEMU_VERSION) | x86_64
              path: $(Pipeline.Workspace)/qemu-cache
              cacheHitVar: QEMU_CACHE_HIT

          - script: |
              echo "Installing QEMU build dependencies..."
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                git \
                build-essential \
                ninja-build \
                python3 \
                python3-pip \
                pkg-config \
                libglib2.0-dev \
                libpixman-1-dev \
                libslirp-dev \
                libcap-ng-dev \
                libattr1-dev \
                meson
            displayName: 'Install dependencies'
            condition: ne(variables.QEMU_CACHE_HIT, 'true')

          - script: |
              set -ex
              cd $(Build.SourcesDirectory)/platform/qemu

              # Run setup (clone, patch, configure)
              ./setup.sh --shallow

              # Build QEMU
              cd build
              ninja -j$(nproc) qemu-system-x86_64

              # Verify PhantomFPGA device exists
              ./qemu-system-x86_64 -device help 2>&1 | grep -q phantomfpga || {
                echo "ERROR: PhantomFPGA device not found in QEMU build!"
                exit 1
              }

              echo "QEMU x86_64 build successful!"
              ./qemu-system-x86_64 --version
            displayName: 'Build QEMU x86_64'
            condition: ne(variables.QEMU_CACHE_HIT, 'true')

          - script: |
              # Save build to cache location
              mkdir -p $(Pipeline.Workspace)/qemu-cache
              cp -r $(Build.SourcesDirectory)/platform/qemu/build/qemu-system-x86_64 \
                    $(Pipeline.Workspace)/qemu-cache/
            displayName: 'Save to cache'
            condition: and(succeeded(), ne(variables.QEMU_CACHE_HIT, 'true'))

          - script: |
              # Restore from cache
              if [ -f "$(Pipeline.Workspace)/qemu-cache/qemu-system-x86_64" ]; then
                mkdir -p $(Build.SourcesDirectory)/platform/qemu/build
                cp $(Pipeline.Workspace)/qemu-cache/qemu-system-x86_64 \
                   $(Build.SourcesDirectory)/platform/qemu/build/
                chmod +x $(Build.SourcesDirectory)/platform/qemu/build/qemu-system-x86_64
                echo "Restored QEMU from cache"
              fi
            displayName: 'Restore from cache'
            condition: eq(variables.QEMU_CACHE_HIT, 'true')

          - publish: $(Build.SourcesDirectory)/platform/qemu/build/qemu-system-x86_64
            artifact: qemu-x86_64
            displayName: 'Publish QEMU x86_64'

      - job: BuildQEMUArm
        displayName: 'QEMU aarch64'
        timeoutInMinutes: $(QEMU_BUILD_TIMEOUT)

        steps:
          - checkout: self
            fetchDepth: 1

          - task: Cache@2
            displayName: 'Cache QEMU build'
            inputs:
              key: 'qemu | $(CACHE_VERSION) | $(QEMU_VERSION) | aarch64 | $(Build.SourceVersion)'
              restoreKeys: |
                qemu | $(CACHE_VERSION) | $(QEMU_VERSION) | aarch64
              path: $(Pipeline.Workspace)/qemu-cache-arm
              cacheHitVar: QEMU_CACHE_HIT

          - script: |
              echo "Installing QEMU build dependencies..."
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                git \
                build-essential \
                ninja-build \
                python3 \
                python3-pip \
                pkg-config \
                libglib2.0-dev \
                libpixman-1-dev \
                libslirp-dev \
                libcap-ng-dev \
                libattr1-dev \
                meson
            displayName: 'Install dependencies'
            condition: ne(variables.QEMU_CACHE_HIT, 'true')

          - script: |
              set -ex
              cd $(Build.SourcesDirectory)/platform/qemu

              # Run setup
              ./setup.sh --shallow

              # Build aarch64 target only
              cd build
              ninja -j$(nproc) qemu-system-aarch64

              # Verify PhantomFPGA device exists
              ./qemu-system-aarch64 -device help 2>&1 | grep -q phantomfpga || {
                echo "ERROR: PhantomFPGA device not found in QEMU build!"
                exit 1
              }

              echo "QEMU aarch64 build successful!"
              ./qemu-system-aarch64 --version
            displayName: 'Build QEMU aarch64'
            condition: ne(variables.QEMU_CACHE_HIT, 'true')

          - script: |
              mkdir -p $(Pipeline.Workspace)/qemu-cache-arm
              cp -r $(Build.SourcesDirectory)/platform/qemu/build/qemu-system-aarch64 \
                    $(Pipeline.Workspace)/qemu-cache-arm/
            displayName: 'Save to cache'
            condition: and(succeeded(), ne(variables.QEMU_CACHE_HIT, 'true'))

          - script: |
              if [ -f "$(Pipeline.Workspace)/qemu-cache-arm/qemu-system-aarch64" ]; then
                mkdir -p $(Build.SourcesDirectory)/platform/qemu/build
                cp $(Pipeline.Workspace)/qemu-cache-arm/qemu-system-aarch64 \
                   $(Build.SourcesDirectory)/platform/qemu/build/
                chmod +x $(Build.SourcesDirectory)/platform/qemu/build/qemu-system-aarch64
                echo "Restored QEMU from cache"
              fi
            displayName: 'Restore from cache'
            condition: eq(variables.QEMU_CACHE_HIT, 'true')

          - publish: $(Build.SourcesDirectory)/platform/qemu/build/qemu-system-aarch64
            artifact: qemu-aarch64
            displayName: 'Publish QEMU aarch64'

  # ============================================================================
  # Stage 2: Build Buildroot Images
  # ============================================================================
  - stage: BuildBuildroot
    displayName: 'Build Guest Images'
    dependsOn: []  # Run in parallel with QEMU build
    jobs:
      - job: BuildrootX86
        displayName: 'Buildroot x86_64'
        timeoutInMinutes: $(BUILDROOT_BUILD_TIMEOUT)

        steps:
          - checkout: self
            fetchDepth: 1

          - task: Cache@2
            displayName: 'Cache Buildroot downloads'
            inputs:
              key: 'buildroot-dl | $(CACHE_VERSION) | $(BUILDROOT_VERSION)'
              path: $(Build.SourcesDirectory)/platform/buildroot/dl
              cacheHitVar: BUILDROOT_DL_CACHE_HIT

          - task: Cache@2
            displayName: 'Cache Buildroot output'
            inputs:
              key: 'buildroot-x86 | $(CACHE_VERSION) | $(BUILDROOT_VERSION) | $(Build.SourceVersion)'
              restoreKeys: |
                buildroot-x86 | $(CACHE_VERSION) | $(BUILDROOT_VERSION)
              path: $(Build.SourcesDirectory)/platform/buildroot/output/x86_64
              cacheHitVar: BUILDROOT_BUILD_CACHE_HIT

          - script: |
              echo "Installing Buildroot dependencies..."
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                build-essential \
                wget \
                cpio \
                unzip \
                rsync \
                bc \
                libncurses-dev \
                file \
                locales

              # Ensure en_US.UTF-8 locale is available (Buildroot needs it)
              sudo locale-gen en_US.UTF-8
            displayName: 'Install dependencies'

          - script: |
              set -ex
              cd $(Build.SourcesDirectory)/platform/buildroot

              # Build x86_64 image
              make x86_64 V=0 NPROC=$(nproc)

              # Verify outputs
              ls -la $(Build.SourcesDirectory)/platform/images/
              test -f $(Build.SourcesDirectory)/platform/images/bzImage
              test -f $(Build.SourcesDirectory)/platform/images/rootfs.ext4

              echo "Buildroot x86_64 build successful!"
            displayName: 'Build x86_64 image'
            condition: ne(variables.BUILDROOT_BUILD_CACHE_HIT, 'true')

          - script: |
              # If we have cache hit, copy images from output to images dir
              if [ -f "$(Build.SourcesDirectory)/platform/buildroot/output/x86_64/images/bzImage" ]; then
                mkdir -p $(Build.SourcesDirectory)/platform/images
                cp $(Build.SourcesDirectory)/platform/buildroot/output/x86_64/images/bzImage \
                   $(Build.SourcesDirectory)/platform/images/
                cp $(Build.SourcesDirectory)/platform/buildroot/output/x86_64/images/rootfs.ext4 \
                   $(Build.SourcesDirectory)/platform/images/
                echo "Restored images from cache"
              fi
            displayName: 'Restore images from cache'
            condition: eq(variables.BUILDROOT_BUILD_CACHE_HIT, 'true')

          - publish: $(Build.SourcesDirectory)/platform/images
            artifact: images-x86_64
            displayName: 'Publish x86_64 images'

      - job: BuildrootArm
        displayName: 'Buildroot aarch64'
        timeoutInMinutes: $(BUILDROOT_BUILD_TIMEOUT)

        steps:
          - checkout: self
            fetchDepth: 1

          - task: Cache@2
            displayName: 'Cache Buildroot downloads'
            inputs:
              key: 'buildroot-dl | $(CACHE_VERSION) | $(BUILDROOT_VERSION)'
              path: $(Build.SourcesDirectory)/platform/buildroot/dl
              cacheHitVar: BUILDROOT_DL_CACHE_HIT

          - task: Cache@2
            displayName: 'Cache Buildroot output'
            inputs:
              key: 'buildroot-arm | $(CACHE_VERSION) | $(BUILDROOT_VERSION) | $(Build.SourceVersion)'
              restoreKeys: |
                buildroot-arm | $(CACHE_VERSION) | $(BUILDROOT_VERSION)
              path: $(Build.SourcesDirectory)/platform/buildroot/output/aarch64
              cacheHitVar: BUILDROOT_BUILD_CACHE_HIT

          - script: |
              echo "Installing Buildroot dependencies..."
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                build-essential \
                wget \
                cpio \
                unzip \
                rsync \
                bc \
                libncurses-dev \
                file \
                locales

              sudo locale-gen en_US.UTF-8
            displayName: 'Install dependencies'

          - script: |
              set -ex
              cd $(Build.SourcesDirectory)/platform/buildroot

              # Build aarch64 image
              make aarch64 V=0 NPROC=$(nproc)

              # Verify outputs
              ls -la $(Build.SourcesDirectory)/platform/images/
              test -f $(Build.SourcesDirectory)/platform/images/Image
              test -f $(Build.SourcesDirectory)/platform/images/rootfs-aarch64.ext4

              echo "Buildroot aarch64 build successful!"
            displayName: 'Build aarch64 image'
            condition: ne(variables.BUILDROOT_BUILD_CACHE_HIT, 'true')

          - script: |
              if [ -f "$(Build.SourcesDirectory)/platform/buildroot/output/aarch64/images/Image" ]; then
                mkdir -p $(Build.SourcesDirectory)/platform/images
                cp $(Build.SourcesDirectory)/platform/buildroot/output/aarch64/images/Image \
                   $(Build.SourcesDirectory)/platform/images/
                cp $(Build.SourcesDirectory)/platform/buildroot/output/aarch64/images/rootfs.ext4 \
                   $(Build.SourcesDirectory)/platform/images/rootfs-aarch64.ext4
                echo "Restored images from cache"
              fi
            displayName: 'Restore images from cache'
            condition: eq(variables.BUILDROOT_BUILD_CACHE_HIT, 'true')

          - publish: $(Build.SourcesDirectory)/platform/images
            artifact: images-aarch64
            displayName: 'Publish aarch64 images'

  # ============================================================================
  # Stage 3: QTest Unit Tests
  # ============================================================================
  - stage: QTest
    displayName: 'QTest Unit Tests'
    dependsOn: BuildQEMU
    jobs:
      - job: QTestX86
        displayName: 'QTest x86_64'
        timeoutInMinutes: $(TEST_TIMEOUT)

        steps:
          - checkout: self
            fetchDepth: 1

          - download: current
            artifact: qemu-x86_64
            displayName: 'Download QEMU x86_64'

          - script: |
              # Install test dependencies
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                libglib2.0-dev \
                libpixman-1-dev
            displayName: 'Install dependencies'

          - script: |
              set -ex

              # Set up QEMU binary
              mkdir -p $(Build.SourcesDirectory)/platform/qemu/build
              cp $(Pipeline.Workspace)/qemu-x86_64/qemu-system-x86_64 \
                 $(Build.SourcesDirectory)/platform/qemu/build/
              chmod +x $(Build.SourcesDirectory)/platform/qemu/build/qemu-system-x86_64

              # Verify device is present
              $(Build.SourcesDirectory)/platform/qemu/build/qemu-system-x86_64 \
                -device help 2>&1 | grep phantomfpga

              echo "QEMU PhantomFPGA device verified"
            displayName: 'Set up QEMU'

          - script: |
              set -ex
              cd $(Build.SourcesDirectory)

              # Run QTest using our helper script
              chmod +x tests/unit/run-qtest.sh

              # Run with timeout
              timeout 600 tests/unit/run-qtest.sh --list || true

              # For now, just verify the device works
              # Full QTest integration requires QEMU test build
              echo "QTest verification complete"
            displayName: 'Run QTest'

          - task: PublishTestResults@2
            displayName: 'Publish QTest results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/qtest-results.xml'
              failTaskOnFailedTests: true
            condition: always()

  # ============================================================================
  # Stage 4: Integration Tests
  # ============================================================================
  - stage: IntegrationTests
    displayName: 'Integration Tests'
    dependsOn:
      - BuildQEMU
      - BuildBuildroot
    jobs:
      - job: IntegrationX86
        displayName: 'Integration Tests x86_64'
        timeoutInMinutes: $(TEST_TIMEOUT)

        steps:
          - checkout: self
            fetchDepth: 1

          - download: current
            artifact: qemu-x86_64
            displayName: 'Download QEMU'

          - download: current
            artifact: images-x86_64
            displayName: 'Download images'

          - script: |
              # Install runtime dependencies
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends \
                libglib2.0-0 \
                libpixman-1-0 \
                libslirp0

              # Check KVM availability (nested virt on Azure)
              if [ -c /dev/kvm ]; then
                sudo chmod 666 /dev/kvm
                echo "KVM is available"
              else
                echo "WARNING: KVM not available, tests will run slower"
              fi
            displayName: 'Install dependencies'

          - script: |
              set -ex

              # Set up QEMU and images
              mkdir -p $(Build.SourcesDirectory)/platform/qemu/build
              mkdir -p $(Build.SourcesDirectory)/platform/images

              cp $(Pipeline.Workspace)/qemu-x86_64/qemu-system-x86_64 \
                 $(Build.SourcesDirectory)/platform/qemu/build/
              chmod +x $(Build.SourcesDirectory)/platform/qemu/build/qemu-system-x86_64

              cp $(Pipeline.Workspace)/images-x86_64/* \
                 $(Build.SourcesDirectory)/platform/images/

              ls -la $(Build.SourcesDirectory)/platform/qemu/build/
              ls -la $(Build.SourcesDirectory)/platform/images/
            displayName: 'Set up test environment'

          - script: |
              set -ex
              cd $(Build.SourcesDirectory)

              # Make scripts executable
              chmod +x ci/scripts/*.sh 2>/dev/null || true
              chmod +x tests/integration/*.sh
              chmod +x platform/run_qemu.sh

              # Run integration tests with CI helper
              ci/scripts/run-integration-tests.sh \
                --arch x86_64 \
                --timeout 300 \
                --junit $(Build.SourcesDirectory)/integration-results-x86.xml
            displayName: 'Run integration tests'
            timeoutInMinutes: 15

          - task: PublishTestResults@2
            displayName: 'Publish integration test results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/integration-results-*.xml'
              failTaskOnFailedTests: true
            condition: always()

          - script: |
              # Collect logs on failure
              mkdir -p $(Build.ArtifactStagingDirectory)/logs
              cp -r $(Build.SourcesDirectory)/*.log \
                    $(Build.ArtifactStagingDirectory)/logs/ 2>/dev/null || true
              dmesg > $(Build.ArtifactStagingDirectory)/logs/dmesg.txt 2>/dev/null || true
            displayName: 'Collect logs'
            condition: always()

          - publish: $(Build.ArtifactStagingDirectory)/logs
            artifact: logs-integration-x86_64
            displayName: 'Publish logs'
            condition: always()

  # ============================================================================
  # Stage 5: Collect Final Artifacts
  # ============================================================================
  - stage: Artifacts
    displayName: 'Collect Artifacts'
    dependsOn:
      - QTest
      - IntegrationTests
    condition: succeededOrFailed()
    jobs:
      - job: CollectArtifacts
        displayName: 'Collect all artifacts'

        steps:
          - checkout: self
            fetchDepth: 1

          - download: current
            displayName: 'Download all artifacts'

          - script: |
              set -ex

              # Create artifact summary
              mkdir -p $(Build.ArtifactStagingDirectory)/summary

              cat > $(Build.ArtifactStagingDirectory)/summary/build-info.txt << EOF
              PhantomFPGA CI Build Summary
              ============================

              Build ID:      $(Build.BuildId)
              Build Number:  $(Build.BuildNumber)
              Source Branch: $(Build.SourceBranch)
              Source Commit: $(Build.SourceVersion)
              Build Reason:  $(Build.Reason)
              Agent:         $(Agent.MachineName)

              QEMU Version:      $(QEMU_VERSION)
              Buildroot Version: $(BUILDROOT_VERSION)

              Artifacts:
              - qemu-x86_64:    QEMU binary for x86_64
              - qemu-aarch64:   QEMU binary for aarch64
              - images-x86_64:  Kernel + rootfs for x86_64
              - images-aarch64: Kernel + rootfs for aarch64

              EOF

              echo "Build summary created"
            displayName: 'Create build summary'

          - publish: $(Build.ArtifactStagingDirectory)/summary
            artifact: build-summary
            displayName: 'Publish build summary'

